spring:
  jpa:
    show-sql: false

docurural:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

server:
  error:
    include-stacktrace: never
    include-message: never

logging:
  level:
    root: INFO
    co.edu.docurural: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
