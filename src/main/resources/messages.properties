# ============================================================
# DocuRural - Mensajes al usuario final
# Consumidos por Bean Validation (anotaciones message="{clave}")
# y por MessageSource (servicios / handler / filtros de seguridad)
# ============================================================

# ------------------------------------------------------------
# VALIDACIONES (consumidas por Bean Validation)
# Sintaxis de placeholder: {min}, {max}, etc. (MessageInterpolator)
# ------------------------------------------------------------
validation.user.full-name.required=El nombre es obligatorio
validation.user.full-name.size=El nombre debe tener entre {min} y {max} caracteres
validation.user.email.required=El correo electrónico es obligatorio
validation.user.email.format=El correo electrónico no tiene un formato válido
validation.user.email.size=El correo electrónico no puede exceder {max} caracteres
validation.user.password.required=La contraseńa es obligatoria
validation.user.password.size=La contraseńa debe tener mínimo {min} caracteres
validation.user.confirm-password.required=La confirmación de contraseńa es obligatoria
validation.user.confirm-password.mismatch=La confirmación de contraseńa no coincide
validation.user.role.required=El rol es obligatorio
validation.user.status.required=El estado es obligatorio

# ------------------------------------------------------------
# AUTH - errores y mensajes de sesión
# Sintaxis de placeholder: {0}, {1}, ... (MessageFormat)
# ------------------------------------------------------------
auth.login.invalid-credentials=Correo o contraseńa incorrectos
auth.login.account-disabled=Su cuenta ha sido desactivada. Contacte al administrador
auth.session.expired=Su sesión ha expirado por inactividad. Por favor inicie sesión nuevamente
auth.token.invalid=Token inválido
auth.logout.success=Sesión cerrada exitosamente
auth.access-denied=No tiene permisos para realizar esta acción

# ------------------------------------------------------------
# USERS - reglas de negocio y mensajes de Éxito
# ------------------------------------------------------------
user.created.success=Usuario creado exitosamente
user.updated.success=Usuario actualizado exitosamente
user.activated.success=Usuario activado exitosamente
user.deactivated.success=Usuario desactivado exitosamente
user.email.already-registered=Ya existe un usuario registrado con este correo electrónico
user.self-role-change.forbidden=No puede cambiar su propio rol
user.self-deactivation.forbidden=No puede desactivar su propia cuenta
user.status.duplicate=El usuario ya se encuentra en el estado solicitado
user.passwords.mismatch=Las contraseńas no coinciden
user.not-found=Usuario no encontrado con id {0}
user.sort.unsupported-field=Campo de ordenamiento no soportado: {0}
user.sort.unsupported-direction=Dirección de ordenamiento no soportada: {0}

# ------------------------------------------------------------
# DOCUMENTS (placeholder para RF-01..RF-03, ya usado por ActivityLogService)
# ------------------------------------------------------------
document.not-found=Documento no encontrado con id {0}

# ------------------------------------------------------------
# ERRORES GENERICOS
# ------------------------------------------------------------
error.validation=Errores de validación
error.bad-request-body=El cuerpo de la solicitud es inválido o contiene un valor no permitido
error.internal-server=Error inesperado del servidor
