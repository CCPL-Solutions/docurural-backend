spring:
  application:
    name: docurural-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:docurural_db}
    username: ${DB_USER:docurural}
    password: ${db-password:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: ${docurural.storage.max-file-size:10MB}
      max-request-size: ${docurural.storage.max-request-size:55MB}
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
    use-code-as-default-message: false
    cache-duration: PT1H

server:
  port: 8080
  servlet:
    context-path: /api

docurural:
  security:
    bcrypt-strength: ${DOCURURAL_BCRYPT_STRENGTH:12}
    jwt:
      secret: ${jwt-secret:${JWT_SECRET:}}
      expiration-ms: ${JWT_EXPIRATION_MS:1800000}
      issuer: ${JWT_ISSUER:docurural}
  storage:
    provider: ${DOCURURAL_STORAGE_PROVIDER:s3}
    base-path: ${DOCURURAL_STORAGE_BASE_PATH:./uploads/documents}
    max-file-size: ${DOCURURAL_STORAGE_MAX_FILE_SIZE:10MB}
    max-request-size: ${DOCURURAL_STORAGE_MAX_REQUEST_SIZE:55MB}
    s3:
      bucket: ${s3-bucket-docs:${DOCURURAL_STORAGE_S3_BUCKET:}}
      region: ${aws-region:${AWS_REGION:us-east-1}}
      key-prefix: ${DOCURURAL_STORAGE_S3_KEY_PREFIX:documents}
  seed:
    admin:
      email: ${ADMIN_SEED_EMAIL:}
      password: ${ADMIN_SEED_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
